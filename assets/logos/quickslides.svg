<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Premium Gradient Matching the QuickSlides theme -->
    <linearGradient id="slidesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background glass ring -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="none" stroke="url(#slidesGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Slide 1 (Back) -->
  <rect x="22" y="32" width="46" height="30" rx="6" fill="#fff" fill-opacity="0.15" stroke="url(#slidesGrad)" stroke-width="2" transform="rotate(-6 45 47)" />
  
  <!-- Slide 2 (Front Accent) -->
  <rect x="34" y="38" width="46" height="30" rx="6" fill="url(#slidesGrad)" filter="url(#shadow)" />
  
  <!-- Slide lines representing charts/text on front slide -->
  <line x1="42" y1="48" x2="62" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <line x1="42" y1="56" x2="72" y2="56" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  
  <!-- Mini Play button overlaying the slides -->
  <polygon points="68,48 68,58 76,53" fill="#ffffff" opacity="0.9"/>
</svg>
