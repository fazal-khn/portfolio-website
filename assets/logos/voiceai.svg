<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Purple to Pink Gradient representing audio waves and AI -->
    <linearGradient id="voiceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="1" dy="2.5" stdDeviation="1.5" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background glass border -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="none" stroke="url(#voiceGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Headphones Circle overlay -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#voiceGrad)" stroke-width="3" stroke-dasharray="160" opacity="0.15"/>
  
  <!-- Sleek Audio Wave Bars (Gradient) -->
  <g transform="translate(0, 0)" filter="url(#shadow)">
    <!-- Wave Bar 1 -->
    <rect x="28" y="42" width="6" height="16" rx="3" fill="url(#voiceGrad)" />
    <!-- Wave Bar 2 -->
    <rect x="38" y="30" width="6" height="40" rx="3" fill="url(#voiceGrad)" />
    <!-- Wave Bar 3 (Center High) -->
    <rect x="48" y="22" width="6" height="56" rx="3" fill="url(#voiceGrad)" />
    <!-- Wave Bar 4 -->
    <rect x="58" y="34" width="6" height="32" rx="3" fill="url(#voiceGrad)" />
    <!-- Wave Bar 5 -->
    <rect x="68" y="44" width="6" height="12" rx="3" fill="url(#voiceGrad)" />
  </g>
  
  <!-- Small AI sparkle star near waves -->
  <path d="M 76,26 L 78,31 L 83,33 L 78,35 L 76,40 L 74,35 L 69,33 L 74,31 Z" fill="#ec4899" opacity="0.9"/>
</svg>
