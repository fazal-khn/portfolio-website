<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Cyan to Green Gradient for safe/private offline translation -->
    <linearGradient id="transGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Border contour -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="none" stroke="url(#transGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Left Globe bubble (Origin language) -->
  <circle cx="40" cy="45" r="22" fill="url(#transGrad)" filter="url(#shadow)" />
  <text x="40" y="52" font-family="'Outfit', sans-serif" font-weight="bold" font-size="20" fill="#ffffff" text-anchor="middle">A</text>
  
  <!-- Shield Overlay (Representing Zero-Data-Leak Privacy) -->
  <path d="M 50,30 L 68,36 C 68,50 59,62 50,66 C 41,62 32,50 32,36 Z" fill="#ffffff" opacity="0.15"/>
  
  <!-- Right Globe bubble (Target language) -->
  <circle cx="62" cy="58" r="18" fill="#ffffff" stroke="url(#transGrad)" stroke-width="2" filter="url(#shadow)" />
  <text x="62" y="64" font-family="'Outfit', sans-serif" font-weight="bold" font-size="16" fill="#06b6d4" text-anchor="middle">文</text>
  
  <!-- Simple sync/transfer arrow -->
  <path d="M 46,38 Q 50,34 54,38" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <path d="M 54,38 L 51,38 M 54,38 L 54,41" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
</svg>
